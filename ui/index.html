<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FamilyAssistant Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="shell-header">
        <h1>FamilyAssistant</h1>
        <p class="subtitle">Local orchestration console</p>
        <div class="meta-row">
          <span id="sessionId" class="pill"></span>
          <span id="status" class="pill status">idle</span>
        </div>
      </header>

      <section class="panel-layout">
        <!-- LEFT PANEL: Memory Management (25%) -->
        <aside class="panel left-panel" aria-label="Memory Manager">
          <div class="panel-header">
            <h2>Memory</h2>
          </div>

          <div class="panel-tabs">
            <button class="memory-tab-btn active" data-tab="list">Available</button>
            <button class="memory-tab-btn" data-tab="new">New</button>
          </div>
          
          <div id="memoryList" class="memory-list">
            <form id="memorySearchForm" class="memory-search-row">
              <input id="memorySearchQuery" placeholder="Filter locally" />
              <button type="submit" class="secondary">🔍</button>
            </form>
            <p id="memoryStatus" class="memory-status" aria-live="polite"></p>
            <div id="memoryResults" class="memory-results"></div>
          </div>

          <div id="memoryNewForm" class="memory-new" style="display: none;">
            <form id="memorySaveForm" class="memory-grid">
              <textarea id="memoryValue" rows="3" placeholder="memory text" required style="grid-column: 1 / -1;"></textarea>
              <input id="memoryTags" placeholder="tags (comma separated)" style="grid-column: 1 / -1;" />
              <button type="submit" class="primary" style="grid-column: 1 / -1;">Add Memory</button>
            </form>
          </div>

        </aside>

        <!-- MIDDLE PANEL: Chat Window (50%) -->
        <section class="panel center-panel">
          <div class="panel-header">
            <h2>Main</h2>
          </div>

          <div class="panel-tabs center-tabs">
            <button id="centerTabChat" class="center-tab-btn active" data-tab="chat">Chat</button>
            <button id="centerTabCalendar" class="center-tab-btn" data-tab="calendar">Calendar</button>
          </div>

          <div class="chat-container">
            <section id="chatView" class="center-view chat-view" aria-live="polite">
              <section id="transcript" class="transcript" aria-live="polite"></section>

              <form id="chatForm" class="composer">
                <label for="prompt" class="sr-only">Message</label>
                <textarea id="prompt" rows="2" placeholder="Type a message for the Family Assistant..." required></textarea>
                <div class="composer-options">
                  <label class="planner-toggle" for="usePlannerToggle">
                    <input id="usePlannerToggle" type="checkbox" checked />
                    <span>Use PLANNER</span>
                  </label>
                  <p class="composer-hint">Enter to send • Shift+Enter for new line</p>
                </div>
                <div class="actions">
                  <button type="submit" id="sendBtn" class="primary">Send</button>
                </div>
              </form>
            </section>

            <section id="calendarView" class="center-view calendar-view" style="display: none;">
              <div class="calendar-toolbar">
                <p id="calendarStatus" class="calendar-status">Loading events...</p>
                <button id="refreshCalendarBtn" type="button" class="secondary">Refresh</button>
              </div>
              <div id="calendarEl" class="calendar-el"></div>
            </section>
          </div>
        </section>

        <!-- RIGHT PANEL: Tools & History (25%) -->
        <aside class="panel right-panel" aria-label="Tools and Execution">

          <div class="panel-header">
            <h2>Tools</h2>
          </div>

          <div class="panel-tabs">
            <button class="panel-tab-btn active" data-tab="tools">Available</button>
            <button class="panel-tab-btn" data-tab="history">History</button>
          </div>

          <div id="toolsList" class="tools-list">
            <p class="tools-loading">Loading tools...</p>
          </div>

          <div id="toolsHistoryPanel" class="tools-history" style="display: none;">
            <div id="toolsHistory" class="tools-history-list"></div>
          </div>
        </aside>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
